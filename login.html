<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід / Реєстрація — AlarmX</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="about.html">⏰ AlarmX</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="about.html">Про додаток</a></li>
                <li class="nav-item"><a class="nav-link active" href="login.html">Вхід / Реєстрація</a></li>
                <li class="nav-item"><a class="nav-link" href="profile.html">Профіль</a></li>
                <li class="nav-item"><a class="nav-link" href="index.html">Будильники</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">

                <!-- Вкладки -->
                <ul class="nav nav-tabs mb-4">
                    <li class="nav-item">
                        <button class="nav-link active" id="loginTab" onclick="showTab('login')">Вхід</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" id="registerTab" onclick="showTab('register')">Реєстрація</button>
                    </li>
                </ul>

                <!-- Форма входу -->
                <div id="loginForm">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" placeholder="example@mail.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Пароль</label>
                        <input type="password" class="form-control" placeholder="Ваш пароль">
                    </div>
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="remember">
                        <label class="form-check-label" for="remember">Запам'ятати мене</label>
                    </div>
                    <div class="d-grid">
                        <button class="btn btn-primary">Увійти</button>
                    </div>
                </div>

                <!-- Форма реєстрації -->
                <div id="registerForm" style="display: none;">
                    <div class="mb-3">
                        <label class="form-label">Ім'я</label>
                        <input type="text" class="form-control" placeholder="Введіть ваше ім'я">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" placeholder="example@mail.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Стать</label>
                        <select class="form-select">
                            <option value="" disabled selected>Оберіть стать</option>
                            <option>Чоловіча</option>
                            <option>Жіноча</option>
                            <option>Не вказувати</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Дата народження</label>
                        <input type="date" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Пароль</label>
                        <input type="password" class="form-control" placeholder="Мінімум 8 символів">
                    </div>
                    <div class="d-grid">
                        <button class="btn btn-primary">Зареєструватись</button>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<footer>
    <p class="mb-0 text-center">AlarmX &copy; 2025</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function showTab(tab) {
        if (tab === 'login') {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginTab').classList.add('active');
            document.getElementById('registerTab').classList.remove('active');
        } else {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('loginTab').classList.remove('active');
            document.getElementById('registerTab').classList.add('active');
        }
    }
</script>
</body>
</html>
