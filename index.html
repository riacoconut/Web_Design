<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Будильники — AlarmX</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="about.html">⏰ AlarmX</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="about.html">Про додаток</a></li>
                <li class="nav-item"><a class="nav-link" href="login.html">Вхід / Реєстрація</a></li>
                <li class="nav-item"><a class="nav-link" href="profile.html">Профіль</a></li>
                <li class="nav-item"><a class="nav-link active" href="index.html">Будильники</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">

    
    <div class="text-center mb-4">
        <h1 id="clock" style="font-size: 3.5rem; font-weight: bold; letter-spacing: 2px;">00:00:00</h1>
        <p id="clock-date" class="text-muted"></p>
    </div>

   
    <div class="card p-4 mb-4">
        <h5 class="mb-3">Додати будильник</h5>
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label">Час</label>
                <input type="time" class="form-control" id="inputTime">
            </div>
            <div class="col-md-5">
                <label class="form-label">Назва</label>
                <input type="text" class="form-control" id="inputLabel" placeholder="Наприклад: Прокидатись">
            </div>
            <div class="col-md-3 d-flex align-items-end">
                <button class="btn btn-primary w-100" onclick="addAlarm()">Додати</button>
            </div>
        </div>
    </div>


    <div id="alarmList"></div>

</div>

<footer>
    <p class="mb-0">AlarmX &copy; 2025</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>

    const days = ['Неділя','Понеділок','Вівторок','Середа','Четвер','П\'ятниця','Субота'];
    const months = ['січня','лютого','березня','квітня','травня','червня','липня','серпня','вересня','жовтня','листопада','грудня'];

    function updateClock() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        const s = String(now.getSeconds()).padStart(2, '0');
        document.getElementById('clock').textContent = h + ':' + m + ':' + s;
        document.getElementById('clock-date').textContent =
            days[now.getDay()] + ', ' + now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear();
    }
    setInterval(updateClock, 1000);
    updateClock();


    let alarms = [
        { id: 1, time: '07:00', label: 'Прокидатись', active: true },
        { id: 2, time: '09:00', label: 'Ранкова зустріч', active: true },
        { id: 3, time: '22:00', label: 'Час спати', active: false }
    ];
    let nextId = 4;

    function renderAlarms() {
        const list = document.getElementById('alarmList');

        if (alarms.length === 0) {
            list.innerHTML = '<p class="text-muted text-center">Будильників ще немає</p>';
            return;
        }

        let html = '';
        alarms.forEach(function(alarm) {
            html += '<div class="card p-3 mb-2">' +
                '<div class="d-flex justify-content-between align-items-center flex-wrap gap-2">' +
                    '<div>' +
                        '<span style="font-size: 1.5rem; font-weight: bold;">' + alarm.time + '</span>' +
                        '<span class="text-muted ms-3">' + alarm.label + '</span>' +
                    '</div>' +
                    '<div class="d-flex gap-2">' +
                        '<div class="form-check form-switch mb-0 d-flex align-items-center">' +
                            '<input class="form-check-input" type="checkbox" ' + (alarm.active ? 'checked' : '') + ' onchange="toggleAlarm(' + alarm.id + ')">' +
                        '</div>' +
                        '<button class="btn btn-outline-danger btn-sm" onclick="deleteAlarm(' + alarm.id + ')">Видалити</button>' +
                    '</div>' +
                '</div>' +
            '</div>';
        });
        list.innerHTML = html;
    }

    function addAlarm() {
        const time = document.getElementById('inputTime').value;
        const label = document.getElementById('inputLabel').value.trim();

        if (!time) {
            alert('Будь ласка, вкажіть час');
            return;
        }

        alarms.push({ id: nextId++, time: time, label: label || 'Будильник', active: true });
        document.getElementById('inputTime').value = '';
        document.getElementById('inputLabel').value = '';
        renderAlarms();
    }

    function toggleAlarm(id) {
        const alarm = alarms.find(function(a) { return a.id === id; });
        if (alarm) alarm.active = !alarm.active;
    }

    function deleteAlarm(id) {
        alarms = alarms.filter(function(a) { return a.id !== id; });
        renderAlarms();
    }

    renderAlarms();
</script>
</body>
</html>
